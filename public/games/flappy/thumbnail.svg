<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="16" fill="#70c5ce"/>
  <!-- Sky gradient rectangle -->
  <rect width="180" height="180" rx="16" fill="url(#grad)" opacity="0.5"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4dc9f6"/>
      <stop offset="100%" stop-color="#70c5ce"/>
    </linearGradient>
  </defs>
  <!-- Ground -->
  <rect x="0" y="140" width="180" height="40" fill="#ded895" rx="0"/>
  <rect x="0" y="140" width="180" height="4" fill="#c4a765"/>
  <!-- Pipe top -->
  <rect x="110" y="50" width="35" height="50" fill="#73bf2e" rx="2"/>
  <rect x="105" y="40" width="45" height="16" fill="#5a9e1a" rx="3"/>
  <!-- Pipe bottom -->
  <rect x="110" y="105" width="35" height="35" fill="#73bf2e" rx="2"/>
  <rect x="105" y="100" width="45" height="16" fill="#5a9e1a" rx="3"/>
  <!-- Bird body -->
  <circle cx="60" cy="90" r="14" fill="#f5c842"/>
  <circle cx="66" cy="86" r="6" fill="#fff"/>
  <circle cx="69" cy="86" r="3.5" fill="#222"/>
  <!-- Beak -->
  <polygon points="72,88 84,91 72,94" fill="#e67e22"/>
  <!-- Wing -->
  <ellipse cx="52" cy="92" rx="8" ry="5" fill="#d4a017" transform="rotate(-15 52 92)"/>
  <!-- Title text -->
  <text x="90" y="25" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="Arial">Flappy Bird</text>
</svg>
