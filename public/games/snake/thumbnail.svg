<svg xmlns="http://www.w3.org/2000/svg" width="480" height="270" viewBox="0 0 480 270">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="snake" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="480" height="270" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#252542" stroke-width="0.5">
    <line x1="60" y1="35" x2="60" y2="235"/>
    <line x1="120" y1="35" x2="120" y2="235"/>
    <line x1="180" y1="35" x2="180" y2="235"/>
    <line x1="240" y1="35" x2="240" y2="235"/>
    <line x1="300" y1="35" x2="300" y2="235"/>
    <line x1="360" y1="35" x2="360" y2="235"/>
    <line x1="420" y1="35" x2="420" y2="235"/>
    <line x1="60" y1="65" x2="420" y2="65"/>
    <line x1="60" y1="95" x2="420" y2="95"/>
    <line x1="60" y1="125" x2="420" y2="125"/>
    <line x1="60" y1="155" x2="420" y2="155"/>
    <line x1="60" y1="185" x2="420" y2="185"/>
    <line x1="60" y1="215" x2="420" y2="215"/>
  </g>
  <!-- Snake body -->
  <rect x="180" y="125" width="26" height="26" rx="4" fill="url(#snake)" opacity="0.7"/>
  <rect x="210" y="125" width="26" height="26" rx="4" fill="url(#snake)" opacity="0.8"/>
  <rect x="240" y="125" width="26" height="26" rx="4" fill="url(#snake)" opacity="0.9"/>
  <rect x="270" y="125" width="26" height="26" rx="4" fill="#764ba2"/>
  <!-- Snake head -->
  <rect x="300" y="125" width="26" height="26" rx="4" fill="#764ba2"/>
  <!-- Food -->
  <circle cx="150" cy="155" r="11" fill="#e74c3c"/>
  <!-- Title -->
  <text x="240" y="25" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" opacity="0.8">贪吃蛇</text>
</svg>